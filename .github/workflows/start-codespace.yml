name: Start Codespace Morning

on:
  schedule:
    - cron: '50 10 * * 1-5'  # 08:00 WIB (Mon-Fri)
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest

    steps:
      - name: Start Codespace via API
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
        run: |
          gh api \
            -X POST \
            /user/codespaces/miniature-acorn-r4q75vvqwg9rhx465/start
